<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST Nextory</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
@font-face {
  font-family: 'Ria';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/RiaSans-ExtraBold.woff2');
}
@font-face {
  font-family: 'Paperozi';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2');
}

:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#222;
}
body.dark{
  --bg:#12141a;
  --card:#1e2230;
  --text:#eee;
}

body{
  margin:0;
  font-family:'Paperozi';
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  background:var(--card);
}
.left{
  display:flex;
  align-items:center;
  gap:10px;
}
.title{
  font-family:'Ria';
  font-size:20px;
}
.menuBtn{
  font-size:22px;
  background:none;
  border:none;
  color:var(--text);
}

/* STORY */
#story{
  display:flex;
  flex-direction:column;
  gap:16px;
  padding:20px;
  overflow-y:auto;
}
.card{
  background:var(--card);
  padding:14px;
  border-radius:14px;
}
.line{
  padding:6px;
  cursor:pointer;
}
.line:hover{
  background:rgba(79,124,255,0.1);
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;height:60px;
  border-radius:50%;
  font-size:30px;
  background:linear-gradient(135deg,#4F7CFF,#8B5CFF);
  color:white;
  border:none;
}

/* SCROLL BTN */
#scrollBtn{
  position:fixed;
  bottom:90px;
  right:20px;
  width:52px;height:52px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  opacity:0;
  transform:translateY(20px);
  transition:0.25s;
}
#scrollBtn.show{
  opacity:1;
  transform:translateY(0);
}

/* MODAL */
.modal{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}
.modal-box{
  background:var(--card);
  width:300px;
  margin:20% auto;
  padding:20px;
  border-radius:12px;
}

/* MENU */
#overlay{
  position:fixed;
  width:100%;height:100%;
  backdrop-filter:blur(10px);
  display:none;
}
#overlay.open{display:block;}

#sideMenu{
  position:fixed;
  left:-280px;
  width:260px;
  height:100%;
  background:var(--card);
  padding:20px;
  transition:0.3s;
}
#sideMenu.open{left:0;}

.menuUser{
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <button class="menuBtn" onclick="toggleMenu()">☰</button>
    <div class="title">KST Nextory</div>
  </div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
  <h3>사용자</h3>
  <div id="menuUsers"></div>

  <hr>
  <button onclick="toggleDark()">🌙 다크모드</button>
  <br><br>
  <button onclick="changeUser()">👤 계정 변경</button>
</div>

<div id="story"></div>
<button id="fab">＋</button>
<button id="scrollBtn">⬇</button>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div id="modalContent"></div>
    <button onclick="submitModal()">확인</button>
    <button onclick="closeModal()">취소</button>
  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCX3ucF2Q-ZKLL4degzN4wEOx_T_Djc2UI",
  authDomain: "kstnextory.firebaseapp.com",
  projectId: "kstnextory"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("stories").doc("main");

/* STATE */
let state={themes:[],users:[],colors:{},currentUser:"",onlineUsers:{}};
let modalConfig={};
let selectedUser=null;
let isLoaded=false;

/* 🎨 색상 팔레트 */
const palette=[
"#ff6b6b","#6bcB77","#4d96ff","#ffd93d","#b983ff",
"#ff9f1c","#2ec4b6","#e71d36","#ff66c4","#00bbf9"
];

/* REALTIME */
docRef.onSnapshot(doc=>{
  if(doc.exists){
    state=doc.data();

    // 색 자동 생성
    state.users.forEach((u,i)=>{
      if(!state.colors[u]){
        state.colors[u]=palette[i%palette.length];
      }
    });

    isLoaded=true;
    render();
    renderMenuUsers();
  }
});

/* SAVE */
function save(){
  if(!isLoaded) return;
  docRef.set(state);
}

/* USER */
function changeUser(){
  openModal({
    title:"사용자",
    type:"select",
    options:["한이","바가","라면","지후"],
    onSubmit:(n)=>{
      state.currentUser=n;

      if(!state.users.includes(n)){
        state.users.push(n);
        state.colors[n]=palette[state.users.length%palette.length];
      }

      save();
    }
  });
}

/* MENU */
function toggleMenu(){
  sideMenu.classList.toggle("open");
  overlay.classList.toggle("open");
}
function closeMenu(){
  sideMenu.classList.remove("open");
  overlay.classList.remove("open");
}

/* MODAL */
function openModal(c,def=""){
  modalConfig=c;
  modalTitle.innerText=c.title;
  modalContent.innerHTML="";

  if(c.type==="text"){
    const i=document.createElement("input");
    i.value=def;
    i.id="mInput";
    modalContent.appendChild(i);
  }

  if(c.type==="select"){
    const s=document.createElement("select");
    s.id="mSelect";
    c.options.forEach(o=>{
      const op=document.createElement("option");
      op.value=o;
      op.innerText=o;
      s.appendChild(op);
    });
    modalContent.appendChild(s);
  }

  modal.style.display="block";
}

function submitModal(){
  let v=document.getElementById("mInput")?.value || document.getElementById("mSelect")?.value;
  if(!v) return;
  modal.style.display="none";
  modalConfig.onSubmit(v);
}

function closeModal(){
  modal.style.display="none";
}

/* CREATE */
fab.onclick=()=>{
  openModal({
    title:"주제",
    type:"text",
    onSubmit:async t=>{
      let theme={id:Date.now()+"",title:t,owner:state.currentUser,lines:[]};

      for(let c of t){
        const txt=await new Promise(res=>{
          openModal({title:c,type:"text",onSubmit:res});
        });
        theme.lines.push({id:Math.random()+"",letter:c,text:txt});
      }

      state.themes.push(theme);
      save();
    }
  });
};

/* EDIT */
function editLine(tid,lid){
  const t=state.themes.find(x=>x.id===tid);
  const l=t.lines.find(x=>x.id===lid);

  openModal({
    title:"수정",
    type:"text",
    onSubmit:(txt)=>{
      l.text=txt;
      save();
    }
  },l.text);
}

/* DELETE */
function deleteLine(tid,lid){
  if(!confirm("삭제할까요?")) return;

  const t=state.themes.find(x=>x.id===tid);
  t.lines=t.lines.filter(x=>x.id!==lid);

  if(t.lines.length===0){
    state.themes=state.themes.filter(x=>x.id!==tid);
  }

  save();
}

/* FILTER */
function filterByUser(u){
  selectedUser = selectedUser===u ? null : u;
  render();
}

/* RENDER */
function render(){
  const s=document.getElementById("story");
  s.innerHTML="";

  const list = selectedUser
    ? state.themes.filter(t=>t.owner===selectedUser)
    : state.themes;

  list.forEach(t=>{
    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <div style="display:flex;justify-content:space-between;">
        <b>${t.title}</b>
        <span onclick="filterByUser('${t.owner}')" 
          style="color:${state.colors[t.owner]};cursor:pointer;font-size:12px;">
          ${t.owner}
        </span>
      </div>
    `;

    t.lines.forEach(l=>{
      const d=document.createElement("div");
      d.className="line";
      d.innerText=`${l.letter}: ${l.text}`;

      d.onclick=()=>{
        const action=prompt("수정 / 삭제");
        if(action==="수정") editLine(t.id,l.id);
        if(action==="삭제") deleteLine(t.id,l.id);
      };

      c.appendChild(d);
    });

    s.appendChild(c);
  });
}

/* SCROLL BTN */
const scrollBtn=document.getElementById("scrollBtn");
let timer;

window.addEventListener("scroll",()=>{
  const max=document.body.scrollHeight-window.innerHeight;

  if(window.scrollY < max/2){
    scrollBtn.innerText="⬇";
    scrollBtn.onclick=()=>window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
  }else{
    scrollBtn.innerText="⬆";
    scrollBtn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
  }

  scrollBtn.classList.add("show");
  clearTimeout(timer);
  timer=setTimeout(()=>scrollBtn.classList.remove("show"),1000);
});

function toggleDark(){
  document.body.classList.toggle("dark");
}

/* USERS MENU */
function renderMenuUsers(){
  menuUsers.innerHTML="";
  state.users.forEach(u=>{
    const div=document.createElement("div");
    div.className="menuUser";
    div.innerHTML=`<span style="color:${state.colors[u]}">${u}</span>`;
    menuUsers.appendChild(div);
  });
}

</script>

</body>
</html>

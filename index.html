<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST Nextory</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
@font-face {
  font-family: 'Ria';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/RiaSans-ExtraBold.woff2');
}
@font-face {
  font-family: 'Paperozi';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2');
}

:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#222;
}
body.dark{
  --bg:#12141a;
  --card:#1e2230;
  --text:#eee;
}

body{
  margin:0;
  font-family:'Paperozi', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:var(--card);
}

.title{
  font-family:'Ria';
  font-size:20px;
}

/* 메뉴 버튼 */
.menuBtn{
  display:none;
  font-size:22px;
  background:none;
  border:none;
}

/* USER */
.user-list{
  display:flex;
  gap:12px;
}

.user{
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

/* STORY */
#story{
  display:flex;
  gap:16px;
  padding:20px;
  overflow-x:auto;
}

.card{
  min-width:260px;
  background:var(--card);
  padding:14px;
  border-radius:14px;
}

.line{
  padding:6px;
  cursor:pointer;
}

.line:hover{
  background:rgba(79,124,255,0.1);
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  background:linear-gradient(135deg,#4F7CFF,#8B5CFF);
  color:white;
  border:none;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  background:rgba(0,0,0,0.5);
}

.modal-box{
  background:var(--card);
  width:300px;
  margin:20% auto;
  padding:20px;
  border-radius:12px;
}

/* 📱 MOBILE */
@media (max-width:768px){

  #story{
    flex-direction:column;
    overflow-x:hidden;
  }

  .user-list{
    display:none;
  }

  .menuBtn{
    display:block;
  }
}

/* 📱 SIDE MENU (덮어쓰기 방식) */
#sideMenu{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100%;
  background:var(--card);
  box-shadow:2px 0 12px rgba(0,0,0,0.15);
  padding:20px;
  transition:0.3s;
  z-index:999;
}

#sideMenu.open{
  left:0;
}

.menuUser{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.online{color:#4cd964;}
.offline{color:#aaa;}
</style>
</head>

<body>

<div class="header">
  <button class="menuBtn" onclick="toggleMenu()">☰</button>
  <div class="title">KST Nextory</div>
  <div class="user-list" id="users"></div>
  <button onclick="changeUser()">👤</button>
  <button onclick="toggleDark()">🌙</button>
</div>

<!-- 📱 SIDE MENU -->
<div id="sideMenu">
  <h3>사용자</h3>
  <div id="menuUsers"></div>

  <hr>

  <button onclick="toggleDark()">🌙 다크모드</button>
  <br><br>
  <button onclick="changeUser()">👤 계정 변경</button>
</div>

<div id="story"></div>
<button id="fab">＋</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div id="modalContent"></div>
    <button onclick="submitModal()">확인</button>
    <button onclick="closeModal()">취소</button>
  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCX3ucF2Q-ZKLL4degzN4wEOx_T_Djc2UI",
  authDomain: "kstnextory.firebaseapp.com",
  projectId: "kstnextory"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("stories").doc("main");

/* STATE */
let state = {
  themes:[],
  users:[],
  colors:{},
  dark:false,
  currentUser:"",
  onlineUsers:{}
};

let isLoaded=false;
const palette=["#ff6b6b","#6bcB77","#4d96ff","#ffd93d","#b983ff"];
let modalConfig={};

/* REALTIME */
docRef.onSnapshot(doc=>{
  if(doc.exists){
    const d=doc.data();

    state.themes=d.themes||[];
    state.users=d.users||[];
    state.colors=d.colors||{};
    state.dark=d.dark||false;
    state.onlineUsers=d.onlineUsers||{};

    state.users.forEach((u,i)=>{
      if(!state.colors[u]){
        state.colors[u]=palette[i%palette.length];
      }
    });

    isLoaded=true;

    applyDark();
    render();
    renderUsers();
    renderMenuUsers();
  }
});

/* SAVE */
function save(){
  if(!isLoaded) return;
  docRef.update(state).catch(()=>docRef.set(state));
}

/* MENU */
function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("open");
}

/* USERS */
function renderUsers(){
  const u=document.getElementById("users");
  u.innerHTML="";

  state.users.forEach(x=>{
    const wrap=document.createElement("div");
    wrap.className="user";

    const dot=document.createElement("div");
    const isOnline=state.onlineUsers[x];

    dot.className="dot";
    dot.style.background=isOnline?state.colors[x]:"#ccc";

    if(isOnline){
      dot.style.boxShadow=`0 0 8px ${state.colors[x]}`;
      dot.style.animation="pulse 1.5s infinite";
    }

    const name=document.createElement("span");
    name.innerText=x;
    name.style.color=state.colors[x];

    wrap.appendChild(dot);
    wrap.appendChild(name);
    u.appendChild(wrap);
  });
}

function renderMenuUsers(){
  const m=document.getElementById("menuUsers");
  m.innerHTML="";

  state.users.forEach(x=>{
    const div=document.createElement("div");
    div.className="menuUser";

    const online=state.onlineUsers[x];

    div.innerHTML=`
      <span style="color:${state.colors[x]}">${x}</span>
      <span class="${online?'online':'offline'}">
        ${online?'●':'○'}
      </span>
    `;

    m.appendChild(div);
  });
}

/* USER */
function askUser(){
  openModal({
    title:"사용자 선택",
    type:"select",
    options:["한이","바가","라면","진상","마토","조교","진지","제갈태윤","지후"],
    onSubmit:setUser
  });
}

function changeUser(){
  askUser();
}

function setUser(n){
  localStorage.setItem("user",n);
  state.currentUser=n;

  if(!state.users.includes(n)){
    state.users.push(n);
    state.colors[n]=palette[state.users.length%palette.length];
  }

  state.onlineUsers[n]=Date.now();
  save();
}

/* DARK */
function toggleDark(){
  state.dark=!state.dark;
  applyDark();
  save();
}
function applyDark(){
  document.body.classList.toggle("dark",state.dark);
}

/* MODAL */
function openModal(c,def=""){
  modalConfig=c;
  document.getElementById("modalTitle").innerText=c.title;

  const box=document.getElementById("modalContent");
  box.innerHTML="";

  if(c.type==="text"){
    const i=document.createElement("input");
    i.id="mInput"; i.value=def;
    box.appendChild(i);
  }

  if(c.type==="select"){
    const s=document.createElement("select");
    s.id="mSelect";
    c.options.forEach(o=>{
      const op=document.createElement("option");
      op.value=o;
      op.innerText=o;
      s.appendChild(op);
    });
    box.appendChild(s);
  }

  document.getElementById("modal").style.display="block";
}

function submitModal(){
  let v="";
  if(modalConfig.type==="text") v=document.getElementById("mInput").value.trim();
  if(modalConfig.type==="select") v=document.getElementById("mSelect").value;

  if(!v) return;

  closeModal();
  modalConfig.onSubmit(v);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* CREATE */
document.getElementById("fab").onclick=()=>{
  openModal({
    title:"주제",
    type:"text",
    onSubmit:async t=>{
      const writer=state.currentUser;

      let theme={
        id:Date.now()+"",
        title:t,
        owner:writer,
        lines:[]
      };

      for(let c of t){
        const txt=await new Promise(res=>{
          openModal({title:c,type:"text",onSubmit:res});
        });

        theme.lines.push({
          id:Math.random()+"",
          letter:c,
          text:txt
        });
      }

      state.themes.push(theme);
      save();
    }
  });
};

/* EDIT / DELETE */
function editLine(tid,lid){
  const t=state.themes.find(x=>x.id===tid);
  const l=t.lines.find(x=>x.id===lid);

  openModal({
    title:"수정",
    type:"text",
    onSubmit:(txt)=>{
      openModal({
        title:"확인",
        type:"select",
        options:["확인","취소"],
        onSubmit:(c)=>{
          if(c==="확인"){l.text=txt;save();}
        }
      });
    }
  },l.text);
}

function deleteLine(tid,lid){
  openModal({
    title:"삭제?",
    type:"select",
    options:["삭제","취소"],
    onSubmit:(r)=>{
      if(r!=="삭제") return;

      openModal({
        title:"진짜 삭제?",
        type:"select",
        options:["확인","취소"],
        onSubmit:(c)=>{
          if(c!=="확인") return;

          const t=state.themes.find(x=>x.id===tid);
          t.lines=t.lines.filter(x=>x.id!==lid);

          if(t.lines.length===0){
            state.themes=state.themes.filter(x=>x.id!==tid);
          }

          save();
        }
      });
    }
  });
}

/* RENDER */
function render(){
  const s=document.getElementById("story");
  s.innerHTML="";

  state.themes.forEach(t=>{
    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <div style="display:flex;justify-content:space-between;">
        <b>${t.title}</b>
        <span style="font-size:12px;color:${state.colors[t.owner]}">
          ${t.owner}
        </span>
      </div>
    `;

    t.lines.forEach(l=>{
      const d=document.createElement("div");
      d.className="line";
      d.innerText=`${l.letter}: ${l.text}`;

      d.onclick=()=>{
        openModal({
          title:"메뉴",
          type:"select",
          options:["수정","삭제","취소"],
          onSubmit:(c)=>{
            if(c==="수정") editLine(t.id,l.id);
            if(c==="삭제") deleteLine(t.id,l.id);
          }
        });
      };

      c.appendChild(d);
    });

    s.appendChild(c);
  });
}

</script>

</body>
</html>

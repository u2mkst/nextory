<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST Nextory</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
@font-face {
  font-family: 'Ria';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/RiaSans-ExtraBold.woff2');
}
@font-face {
  font-family: 'Paperozi';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2');
}

:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#222;
}
body.dark{
  --bg:#12141a;
  --card:#1e2230;
  --text:#eee;
}

body{
  margin:0;
  font-family:'Paperozi';
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  background:var(--card);
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.title{
  font-family:'Ria';
  font-size:20px;
  white-space:nowrap;
}

/* MENU BUTTON */
.menuBtn{
  font-size:22px;
  background:none;
  border:none;
  cursor:pointer;
  color:var(--text);
}

/* STORY */
#story{
  display:flex;
  gap:16px;
  padding:20px;
  overflow-x:auto;
}

.card{
  min-width:260px;
  background:var(--card);
  padding:14px;
  border-radius:14px;
}

.line{
  padding:6px;
  cursor:pointer;
}
.line:hover{
  background:rgba(79,124,255,0.1);
}

/* FAB */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;height:60px;
  border-radius:50%;
  font-size:30px;
  background:linear-gradient(135deg,#4F7CFF,#8B5CFF);
  color:white;
  border:none;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  background:rgba(0,0,0,0.5);
}
.modal-box{
  background:var(--card);
  width:300px;
  margin:20% auto;
  padding:20px;
  border-radius:12px;
}

/* MOBILE */
@media (max-width:768px){
  #story{
    flex-direction:column;
    overflow-x:hidden;
  }
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.2);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:998;
}
#overlay.open{
  opacity:1;
  pointer-events:auto;
}

/* SIDE MENU */
#sideMenu{
  position:fixed;
  top:0;
  left:-280px;
  width:260px;
  height:100%;
  background:var(--card);
  padding:20px;
  transition:0.35s cubic-bezier(.4,0,.2,1);
  z-index:999;
  box-shadow:2px 0 20px rgba(0,0,0,0.2);
}
#sideMenu.open{
  left:0;
}

.menuUser{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.online{color:#4cd964;}
.offline{color:#aaa;}

/* MENU LINK */
.menuLink{
  display:block;
  padding:12px;
  border-radius:10px;
  background:rgba(79,124,255,0.1);
  text-decoration:none;
  color:var(--text);
  font-size:14px;
}
.menuLink:hover{
  background:rgba(79,124,255,0.2);
}

.closeBtn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff4d4d;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <button class="menuBtn" onclick="toggleMenu()">☰</button>
    <div class="title">KST Nextory</div>
  </div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
  <h3>사용자</h3>
  <div id="menuUsers"></div>

  <hr>

  <button onclick="toggleDark()">🌙 다크모드</button>
  <br><br>
  <button onclick="changeUser()">👤 계정 변경</button>

  <hr>

  <a href="https://u2mkst.github.io/ksthub/" target="_blank" class="menuLink">
    우리학교 급식 · 시간표 보러가기
  </a>

  <br><br>

  <button class="closeBtn" onclick="closeMenu()">
    fldzm cnrkgownj
  </button>
</div>

<div id="story"></div>
<button id="fab">＋</button>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div id="modalContent"></div>
    <button onclick="submitModal()">확인</button>
    <button onclick="closeModal()">취소</button>
  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCX3ucF2Q-ZKLL4degzN4wEOx_T_Djc2UI",
  authDomain: "kstnextory.firebaseapp.com",
  projectId: "kstnextory"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("stories").doc("main");

/* STATE */
let state={
  themes:[],
  users:[],
  colors:{},
  currentUser:"",
  onlineUsers:{}
};

let isLoaded=false;
const palette=["#ff6b6b","#6bcB77","#4d96ff","#ffd93d","#b983ff"];
let modalConfig={};

/* REALTIME */
docRef.onSnapshot(doc=>{
  if(doc.exists){
    const d=doc.data();

    state.themes=d.themes||[];
    state.users=d.users||[];
    state.colors=d.colors||{};
    state.onlineUsers=d.onlineUsers||{};

    isLoaded=true;

    render();
    renderMenuUsers();
  }
});

/* SAVE */
function save(){
  if(!isLoaded) return;
  docRef.update(state).catch(()=>docRef.set(state));
}

/* MENU */
function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}
function closeMenu(){
  document.getElementById("sideMenu").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

/* USERS */
function renderMenuUsers(){
  const m=document.getElementById("menuUsers");
  m.innerHTML="";

  state.users.forEach(x=>{
    const div=document.createElement("div");
    div.className="menuUser";

    const online=state.onlineUsers[x];

    div.innerHTML=`
      <span style="color:${state.colors[x]}">${x}</span>
      <span class="${online?'online':'offline'}">
        ${online?'●':'○'}
      </span>
    `;
    m.appendChild(div);
  });
}

/* USER */
function changeUser(){
  askUser();
}

function askUser(){
  openModal({
    title:"사용자 선택",
    type:"select",
    options:["한이","바가","라면","진상","마토","조교","진지","제갈태윤","지후"],
    onSubmit:(n)=>{
      localStorage.setItem("user",n);
      state.currentUser=n;

      if(!state.users.includes(n)){
        state.users.push(n);
        state.colors[n]=palette[state.users.length%palette.length];
      }

      state.onlineUsers[n]=Date.now();
      save();
    }
  });
}

/* DARK */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* MODAL */
function openModal(c){
  modalConfig=c;
  document.getElementById("modalTitle").innerText=c.title;

  const box=document.getElementById("modalContent");
  box.innerHTML="";

  if(c.type==="text"){
    const i=document.createElement("input");
    i.id="mInput";
    box.appendChild(i);
  }

  if(c.type==="select"){
    const s=document.createElement("select");
    s.id="mSelect";
    c.options.forEach(o=>{
      const op=document.createElement("option");
      op.value=o;
      op.innerText=o;
      s.appendChild(op);
    });
    box.appendChild(s);
  }

  document.getElementById("modal").style.display="block";
}

function submitModal(){
  let v=document.getElementById("mInput")?.value || document.getElementById("mSelect")?.value;
  if(!v) return;

  closeModal();
  modalConfig.onSubmit(v);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* CREATE */
document.getElementById("fab").onclick=()=>{
  openModal({
    title:"주제",
    type:"text",
    onSubmit:async t=>{
      let theme={
        id:Date.now()+"",
        title:t,
        owner:state.currentUser,
        lines:[]
      };

      for(let c of t){
        const txt=await new Promise(res=>{
          openModal({title:c,type:"text",onSubmit:res});
        });

        theme.lines.push({
          id:Math.random()+"",
          letter:c,
          text:txt
        });
      }

      state.themes.push(theme);
      save();
    }
  });
};

/* RENDER */
function render(){
  const s=document.getElementById("story");
  s.innerHTML="";

  state.themes.forEach(t=>{
    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <div style="display:flex;justify-content:space-between;">
        <b>${t.title}</b>
        <span style="font-size:12px;color:${state.colors[t.owner]}">
          ${t.owner}
        </span>
      </div>
    `;

    t.lines.forEach(l=>{
      const d=document.createElement("div");
      d.className="line";
      d.innerText=`${l.letter}: ${l.text}`;
      c.appendChild(d);
    });

    s.appendChild(c);
  });
}

</script>

</body>
</html>

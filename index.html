<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST Nextory</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
@font-face {
  font-family: 'Ria';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/RiaSans-ExtraBold.woff2');
}
@font-face {
  font-family: 'Paperozi';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2');
}

:root{
  --bg:#f6f7fb;
  --card:#fff;
  --text:#222;
}
body.dark{
  --bg:#12141a;
  --card:#1e2230;
  --text:#eee;
}

body{
  margin:0;
  font-family:'Paperozi';
  background:var(--bg);
  color:var(--text);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  background:var(--card);
}
.left{display:flex;gap:10px;align-items:center;}
.title{font-family:'Ria';font-size:20px; cursor:pointer;} /* 커서 포인터 추가 */
.menuBtn{font-size:22px;background:none;border:none;color:var(--text);}

#story{display:flex;flex-direction:column;gap:16px;padding:20px;}
.card{background:var(--card);padding:14px;border-radius:14px;}

.line{
  padding:8px 6px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius: 6px;
  position: relative;
}
.line:hover{background:rgba(79,124,255,0.1);}

.more-btn {
  background: none;
  border: none;
  font-size: 18px;
  color: #888;
  cursor: pointer;
  padding: 0 5px;
}
.line-menu {
  display: none;
  position: absolute;
  right: 25px;
  top: 10px;
  background: var(--card);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  border-radius: 6px;
  overflow: hidden;
  z-index: 10;
  flex-direction: column;
  min-width: 60px;
}
body.dark .line-menu {
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.line-menu.show { display: flex; }
.line-menu button {
  background: none;
  border: none;
  padding: 8px 12px;
  font-family: 'Paperozi';
  cursor: pointer;
  text-align: center;
  color: var(--text);
  font-size: 13px;
}
.line-menu button:hover { background: rgba(128,128,128,0.1); }
.line-menu .btn-del { color: #ff6b6b; }

.like{
  margin-top:6px;
  cursor:pointer;
  font-size:14px;
}

#fab{
  position:fixed;bottom:20px;right:20px;
  width:60px;height:60px;border-radius:50%;
  font-size:30px;background:linear-gradient(135deg,#4F7CFF,#8B5CFF);
  color:white;border:none; cursor:pointer;
}

#scrollBtn{
  position:fixed;bottom:90px;right:20px;
  width:52px;height:52px;border-radius:50%;
  border:none;background:rgba(255,255,255,0.6);
  opacity:0;transition:0.25s; cursor:pointer;
}
#scrollBtn.show{opacity:1;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);display:none; z-index: 1000;
}
.modal-box{
  background:var(--card);
  width:300px;margin:30% auto;padding:20px;
  border-radius:12px;
}
.modal-box input,.modal-box select{
  width:90%;padding:10px;margin-top:10px; margin-bottom: 15px;
  border: 1px solid #ccc; border-radius: 6px; font-family: 'Paperozi';
}
.modal-box button {
  padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Paperozi';
}

#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none; z-index: 900;}
#overlay.open{display:block;}
#sideMenu{
  position:fixed;top:0;left:-280px;width:260px;height:100%;
  background:var(--card);padding:20px;transition:0.3s; z-index: 999;
}
#sideMenu.open{left:0;}
.menuUser{display:flex;justify-content:space-between; margin-bottom: 8px;}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <button class="menuBtn" onclick="toggleMenu()">☰</button>
    <div class="title" onclick="goHome()">KST Nextory</div>
  </div>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
  <h3>사용자</h3>
  <div id="menuUsers"></div>
  <hr>
  <button onclick="toggleDark()" style="padding:8px; width:100%; text-align:left; border:none; background:none; cursor:pointer; font-family:'Paperozi'; color:var(--text);">🌙 다크모드</button><br>
  <button onclick="changeUser()" style="padding:8px; width:100%; text-align:left; border:none; background:none; cursor:pointer; font-family:'Paperozi'; color:var(--text);">👤 계정 변경</button>
</div>

<div id="story"></div>
<button id="fab">＋</button>
<button id="scrollBtn">⬇</button>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div id="modalContent"></div>
    <div style="text-align:right;">
      <button onclick="submitModal()" style="background:#4F7CFF; color:white;">확인</button>
      <button onclick="closeModal()" style="background:#eee; color:#333;">취소</button>
    </div>
  </div>
</div>

<script>
const fab = document.getElementById("fab");
const scrollBtn = document.getElementById("scrollBtn");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");
const menuUsers = document.getElementById("menuUsers");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalContent = document.getElementById("modalContent");
const story = document.getElementById("story");

const firebaseConfig = {
  apiKey: "AIzaSyCX3ucF2Q-ZKLL4degzN4wEOx_T_Djc2UI",
  authDomain: "kstnextory.firebaseapp.com",
  projectId: "kstnextory"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("stories").doc("main");

let state={themes:[],users:[],colors:{},currentUser:""};
let modalConfig={},selectedUser=null,isLoaded=false;

const palette=["#ff6b6b","#6bcB77","#4d96ff","#ffd93d","#b983ff"];

/* 홈으로 이동 함수 */
function goHome() {
  selectedUser = null;
  render();
}

async function init(){
  try {
    const d=await docRef.get();
    if(!d.exists){
      await docRef.set({
        themes:[],
        users:["한이"],
        colors:{ "한이":"#ff6b6b" },
        currentUser:"한이"
      });
    }
  } catch(e) { console.error(e); }
}

docRef.onSnapshot(doc=>{
  if(doc.exists){
    state=doc.data();
    state.themes=state.themes||[];
    state.users=state.users||[];
    state.colors=state.colors||{};

    if(!state.currentUser){
      state.currentUser=state.users[0];
    }
    state.users.forEach((u,i)=>{
      if(!state.colors[u]){
        state.colors[u]=palette[i%palette.length];
      }
    });

    isLoaded=true;
    render();
    renderMenuUsers();
  }
});

function save(){ if(isLoaded) docRef.set(state); }

function changeUser(){
  openModal({
    title:"사용자 변경",
    type:"select",
    options:["한이","바가","라면","진지","조교","제갈태윤","진상","지후","마토","준수T"],
    onSubmit:n=>{
      state.currentUser=n;
      if(!state.users.includes(n)){
        state.users.push(n);
        state.colors[n]=palette[(state.users.length-1)%palette.length];
      }
      save();
    }
  });
}

function toggleMenu(){
  sideMenu.classList.toggle("open");
  overlay.classList.toggle("open");
}
function closeMenu(){
  sideMenu.classList.remove("open");
  overlay.classList.remove("open");
}

function openModal(config, def=""){
  modalConfig=config;
  modalTitle.innerText=config.title;
  modalContent.innerHTML="";

  if(config.type==="text"){
    const i=document.createElement("input");
    i.value=def; i.id="mInput";
    modalContent.appendChild(i);
    setTimeout(() => i.focus(), 100);
  }

  if(config.type==="select"){
    const s=document.createElement("select");
    s.id="mSelect";
    config.options.forEach(o=>{
      const op=document.createElement("option");
      op.value=o; op.innerText=o;
      if(o === state.currentUser) op.selected = true;
      s.appendChild(op);
    });
    modalContent.appendChild(s);
  }

  modal.style.display="block";
}

function submitModal(){
  let v=document.getElementById("mInput")?.value || document.getElementById("mSelect")?.value;
  if(!v) { alert("내용을 입력해주세요!"); return; }
  modal.style.display="none";
  modalConfig.onSubmit(v);
}

function closeModal(){ 
  modal.style.display="none"; 
  if(modalConfig.onCancel) modalConfig.onCancel();
}

fab.onclick=()=>{
  if(!state.currentUser){ alert("좌측 상단 메뉴(☰)에서 사용자를 먼저 설정해주세요!"); return; }
  openModal({
    title:"주제 추가",
    type:"text",
    onSubmit:async t=>{
      let theme={ id:Date.now()+"", title:t, owner:state.currentUser, lines:[], likes:[] };
      let isCancelled = false;
      for(let c of t){
        if(isCancelled) break;
        const txt=await new Promise(res=>{
          openModal({ title:`'${c}' (N행시)`, type:"text", onSubmit:res, onCancel: () => res(null) });
        });
        if(txt === null) { isCancelled = true; break; }
        theme.lines.push({id:Math.random()+"",letter:c,text:txt});
      }
      if(!isCancelled && theme.lines.length > 0) { state.themes.push(theme); save(); render(); }
    },
    onCancel: () => {} 
  });
};

function toggleLike(tid){
  const t=state.themes.find(x=>x.id===tid);
  if(!t.likes) t.likes=[];
  const i=t.likes.indexOf(state.currentUser);
  if(i>-1) t.likes.splice(i,1); else t.likes.push(state.currentUser);
  save();
}

function toggleOptionMenu(lid, event) {
  event.stopPropagation();
  const targetMenu = document.getElementById(`menu-${lid}`);
  const isCurrentlyOpen = targetMenu.classList.contains('show');
  document.querySelectorAll('.line-menu').forEach(m => m.classList.remove('show'));
  if (!isCurrentlyOpen) targetMenu.classList.add('show');
}

document.addEventListener('click', () => {
  document.querySelectorAll('.line-menu').forEach(m => m.classList.remove('show'));
});

function editLine(tid,lid){
  const t=state.themes.find(x=>x.id===tid);
  const l=t.lines.find(x=>x.id===lid);
  openModal({
    title:"내용 수정",
    type:"text",
    onSubmit:txt=>{ l.text=txt; save(); render(); }
  }, l.text);
}

function deleteLine(tid,lid){
  const t=state.themes.find(x=>x.id===tid);
  if(!confirm("이 줄을 정말 삭제하시겠습니까?")) return;
  t.lines = t.lines.filter(x=>x.id!==lid);
  if(t.lines.length===0){ state.themes = state.themes.filter(x=>x.id!==tid); }
  save(); render();
}

function filterByUser(u){
  selectedUser = selectedUser===u ? null : u;
  render();
}

function render(){
  story.innerHTML="";
  const list = selectedUser ? state.themes.filter(t=>t.owner===selectedUser) : state.themes;

  list.forEach(t=>{
    if(!t.lines) t.lines=[];
    if(!t.likes) t.likes=[];
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`
      <div style="display:flex;justify-content:space-between; margin-bottom:10px;">
        <b style="font-size:18px;">${t.title}</b>
        <span onclick="filterByUser('${t.owner}')"
          style="color:${state.colors[t.owner]};cursor:pointer;font-size:13px; font-weight:bold;">
          ${t.owner}
        </span>
      </div>
    `;

    t.lines.forEach(l=>{
      const d=document.createElement("div");
      d.className="line";
      let actionBtns = "";
      if(state.currentUser === t.owner) {
        actionBtns = `
          <div>
            <button class="more-btn" onclick="toggleOptionMenu('${l.id}', event)">⋮</button>
            <div class="line-menu" id="menu-${l.id}">
              <button onclick="editLine('${t.id}','${l.id}')">수정</button>
              <button class="btn-del" onclick="deleteLine('${t.id}','${l.id}')">삭제</button>
            </div>
          </div>
        `;
      }
      d.innerHTML=`<span><b>${l.letter}</b>: ${l.text}</span> ${actionBtns}`;
      c.appendChild(d);
    });

    const likeDiv = document.createElement("div");
    likeDiv.className = "like";
    likeDiv.onclick = () => toggleLike(t.id);
    likeDiv.innerHTML = `${t.likes.includes(state.currentUser) ? "❤️" : "🤍"} ${t.likes.length}`;
    c.appendChild(likeDiv);
    story.appendChild(c);
  });
}

let timer;
window.addEventListener("scroll",()=>{
  const max=document.body.scrollHeight - window.innerHeight;
  if(window.scrollY < max/2){
    scrollBtn.innerText="⬇";
    scrollBtn.onclick=()=>window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
  }else{
    scrollBtn.innerText="⬆";
    scrollBtn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});
  }
  scrollBtn.classList.add("show");
  clearTimeout(timer);
  timer=setTimeout(()=>scrollBtn.classList.remove("show"),1500);
});

function toggleDark(){ document.body.classList.toggle("dark"); }

function renderMenuUsers(){
  menuUsers.innerHTML="";
  state.users.forEach(u=>{
    const div=document.createElement("div");
    div.className="menuUser";
    div.innerHTML=`<span style="color:${state.colors[u]}; font-weight:bold;">${u}</span> ${u === state.currentUser ? '<span>(현재)</span>' : ''}`;
    menuUsers.appendChild(div);
  });
}

init();

</script>
</body>
</html>
